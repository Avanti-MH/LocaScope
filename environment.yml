# ────────────────────────────────────────────────────────────────────────────
# 特殊安裝步驟（需手動執行，順序不可反）：
#
# 1. pip install git+https://github.com/facebookresearch/ToMe.git
# 2. pip install "timm>=1.0.3"        # 必須在 tome 之後，否則 tome 會降版 timm
# 3. wget https://github.com/Dao-AILab/flash-attention/releases/download/v2.5.8/flash_attn-2.5.8+cu122torch2.3cxx11abiFALSE-cp39-cp39-linux_x86_64.whl
#    pip install flash_attn-2.5.8+cu122torch2.3cxx11abiFALSE-cp39-cp39-linux_x86_64.whl
#
# flash-attn 需要 CUDA 12.x + PyTorch 2.3，wget wheel 是為了繞開跨裝置搬移問題。
# ────────────────────────────────────────────────────────────────────────────
